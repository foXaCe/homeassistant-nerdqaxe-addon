name: Bug Report
description: Report a bug with the NerdQAxe+ Miner integration
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill out the form below to help us understand and fix the issue.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have updated to the latest version of the integration
          required: true
        - label: I have checked that this issue has not already been reported
          required: true
        - label: I have enabled debug logging and included relevant logs
          required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: What should have happened...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: What actually happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: What version of Home Assistant are you running?
      placeholder: "2024.1.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      description: What version of the integration are you using?
      placeholder: "1.3.5"
    validations:
      required: true

  - type: input
    id: firmware_version
    attributes:
      label: NerdQAxe+ firmware version
      description: What firmware version is your miner running?
      placeholder: "v2.x.x"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Please provide relevant logs. Enable debug logging by adding this to configuration.yaml:
        ```yaml
        logger:
          default: info
          logs:
            custom_components.nerdqaxe: debug
        ```
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem
    validations:
      required: false
