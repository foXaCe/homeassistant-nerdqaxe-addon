name: Feature Request
description: Suggest a new feature for the NerdQAxe+ Miner integration
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!
        Please describe what you'd like to see added to the integration.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked that this feature has not already been requested
          required: true
        - label: I have verified this feature is not already available in the latest version
          required: true

  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: A clear description of the feature you'd like
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Why do you need this feature? What problem does it solve?
      placeholder: Explain your use case...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions?
      placeholder: Describe any alternatives...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the feature request
    validations:
      required: false
