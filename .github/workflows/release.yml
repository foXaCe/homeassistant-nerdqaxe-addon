name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(grep -oP '"version":\s*"\K[^"]+' custom_components/nerdqaxe/manifest.json)
          TAG_VERSION=${{ steps.version.outputs.version }}
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: manifest.json version ($MANIFEST_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Use the CHANGELOG.md section matching "## [VERSION]" as the release body.
          NOTES=$(awk -v ver="## [$VERSION]" '
            /^## \[/ { if (found) exit; if (index($0, ver) == 1) { found=1; next } }
            found { print }
          ' CHANGELOG.md)

          if [ -n "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "Using CHANGELOG.md section for $VERSION"
          elif printf '%s' "$GITHUB_REF" | grep -qE 'beta|alpha'; then
            # Pre-release without a dedicated CHANGELOG entry: fall back to the
            # commit list since the previous tag so the body is never empty.
            echo "No CHANGELOG.md section for pre-release $VERSION; using commit log"
            PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || true)
            RANGE="${GITHUB_REF}"
            [ -n "$PREV_TAG" ] && RANGE="${PREV_TAG}..${GITHUB_REF}"
            NOTES=$(printf '### Changes\n'; git log --no-merges --pretty='- %s' "$RANGE")
          else
            echo "::error::No CHANGELOG.md section found for version $VERSION"
            exit 1
          fi

          {
            echo "notes<<CHANGELOG_EOF"
            printf '%s\n' "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
